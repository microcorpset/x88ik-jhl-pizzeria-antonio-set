<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#09101d" id="theme-color-meta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Barra" id="apple-mobile-title">
<link rel="manifest" href="manifest-barra.webmanifest" id="app-manifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/barra-192.png" id="app-icon">
<link rel="apple-touch-icon" href="icons/barra-180.png" id="apple-touch-icon">
<script>
  (function () {
    var esCocina = location.pathname.includes('cocina') || location.search.includes('rol=cocina');
    if (!esCocina) return;
    var title = document.getElementById('page-title');
    var manifest = document.getElementById('app-manifest');
    var icon = document.getElementById('app-icon');
    var appleIcon = document.getElementById('apple-touch-icon');
    var appleTitle = document.getElementById('apple-mobile-title');
    var theme = document.getElementById('theme-color-meta');
    if (title) title.textContent = 'Comandero 2.5 - Cocina';
    if (manifest) manifest.setAttribute('href', 'manifest-cocina.webmanifest');
    if (icon) icon.setAttribute('href', 'icons/cocina-192.png');
    if (appleIcon) appleIcon.setAttribute('href', 'icons/cocina-180.png');
    if (appleTitle) appleTitle.setAttribute('content', 'Cocina');
    if (theme) theme.setAttribute('content', '#071522');
    document.title = 'Comandero 2.5 - Cocina';
  })();
</script>
<title id="page-title">Comandero 2.5 - Barra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#d8ff61;
    --accent-dim:rgba(216,255,97,.14);
    --accent-text:#09101e;
    --bg:#09101d;
    --bg-soft:#11192f;
    --surface:rgba(14,20,38,.92);
    --surface2:rgba(22,31,57,.96);
    --surface3:rgba(29,39,71,.96);
    --border:rgba(182,196,255,.12);
    --border-strong:rgba(182,196,255,.22);
    --text:#f5f7ff;
    --muted:#96a2c8;
    --muted-strong:#c4cbdf;
    --sans:'DM Sans',sans-serif;
    --mono:'DM Mono',monospace;
    --font-scale:1;
    --count-bg:rgba(255,255,255,.05);
    --count-text:#d6dcee;
    --highlight-bg:rgba(216,255,97,.08);
    --highlight-border:rgba(216,255,97,.42);
    --shadow:0 24px 80px rgba(0,0,0,.34);
  }
  .rol-cocina{
    --accent:#74dfff;
    --accent-dim:rgba(116,223,255,.15);
    --accent-text:#04131d;
    --highlight-bg:rgba(116,223,255,.08);
    --highlight-border:rgba(116,223,255,.42);
  }
  body.theme-light{
    --accent:#728d00;
    --accent-dim:rgba(114,141,0,.14);
    --accent-text:#fbfcf2;
    --bg:#eef2f8;
    --bg-soft:#dde4ef;
    --surface:rgba(255,255,255,.9);
    --surface2:#f8fbff;
    --surface3:#ebf1fa;
    --border:rgba(65,84,122,.12);
    --border-strong:rgba(65,84,122,.2);
    --text:#162038;
    --muted:#667492;
    --muted-strong:#43506a;
    --count-bg:rgba(31,41,55,.06);
    --count-text:#344055;
    --highlight-bg:rgba(114,141,0,.08);
    --highlight-border:rgba(114,141,0,.3);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 16%, color-mix(in srgb, var(--accent) 15%, transparent), transparent 24%),
      radial-gradient(circle at 86% 12%, rgba(126,182,255,.13), transparent 24%),
      linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 78%, var(--bg-soft) 22%) 100%);
    color:var(--text);
    font-family:var(--sans);
  }
  body::before{
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size:24px 24px;
    mask-image:linear-gradient(180deg, rgba(0,0,0,.7), transparent 92%);
  }
  .topbar,.screen-shell,#pedidos-container,.bulk-banner,#pin-screen,.modal-overlay{position:relative;z-index:1}

  .topbar{
    position:sticky; top:10px; z-index:20;
    width:min(1280px, calc(100% - 24px));
    margin:12px auto 0;
    min-height:62px;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:12px 14px;
    background:rgba(10,15,29,.82);
    border:1px solid var(--border);
    border-radius:22px;
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
  }
  body.theme-light .topbar{background:rgba(255,255,255,.8)}
  .topbar-title{
    font-family:var(--mono);
    font-size:calc(18px * var(--font-scale));
    color:var(--accent);
    letter-spacing:-.05em;
  }
  .spacer{flex:1}
  .badge-nuevos{
    background:var(--accent-dim);
    color:var(--accent);
    font-family:var(--mono);
    font-size:calc(11px * var(--font-scale));
    padding:7px 12px;
    border-radius:999px;
    border:1px solid color-mix(in srgb, var(--accent) 44%, transparent);
    display:none;
  }
  .clock{font-family:var(--mono); font-size:calc(13px * var(--font-scale)); color:var(--muted)}
  .print-toggle,.wake-toggle{
    display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:calc(11px * var(--font-scale));
    color:var(--muted); cursor:pointer;
    border:1px solid var(--border); border-radius:999px; padding:7px 10px;
    background:rgba(255,255,255,.03);
  }
  .toggle-track,.wake-track{
    width:36px; height:20px; border-radius:10px;
    background:var(--border); position:relative; transition:background .2s; flex-shrink:0;
  }
  .toggle-track.on,.wake-track.on{background:var(--accent)}
  .toggle-thumb,.wake-thumb{
    width:16px; height:16px; border-radius:50%; background:#fff;
    position:absolute; top:2px; left:2px; transition:left .2s;
  }
  .toggle-track.on .toggle-thumb,.wake-track.on .wake-thumb{left:18px}
  .prefs-wrap{position:relative}
  .prefs-btn{
    height:36px; min-width:36px; padding:0 12px;
    border-radius:12px; border:1px solid var(--border);
    background:rgba(255,255,255,.04); color:var(--text);
    cursor:pointer; font-family:var(--mono); font-size:calc(12px * var(--font-scale));
  }
  .prefs-panel{
    position:absolute; top:calc(100% + 10px); right:0; width:240px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; padding:14px; display:none; box-shadow:var(--shadow);
  }
  .prefs-panel.open{display:block}
  .prefs-label{
    display:block; margin-bottom:6px;
    color:var(--muted); font-family:var(--mono); font-size:calc(11px * var(--font-scale));
  }
  .prefs-panel select{
    width:100%; margin-bottom:10px; padding:10px 12px;
    border-radius:12px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text); font-family:var(--sans);
  }

  @keyframes flash-bg{0%,100%{background:transparent}50%{background:var(--accent-dim)}}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
  body.hay-nuevos .topbar{box-shadow:0 24px 80px rgba(0,0,0,.34), 0 0 0 1px var(--accent-dim)}

  .screen-shell{
    width:min(1280px, calc(100% - 24px));
    margin:14px auto 0;
    padding-bottom:20px;
  }
  .bulk-banner{
    margin:0 0 14px;
    padding:14px 16px;
    border:1px solid var(--highlight-border);
    border-radius:18px;
    background:linear-gradient(180deg, color-mix(in srgb, var(--highlight-bg) 80%, var(--surface) 20%), transparent);
    display:none; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .bulk-banner.open{display:flex}
  .bulk-text{flex:1; font-size:calc(13px * var(--font-scale)); color:var(--muted-strong)}
  .bulk-btn{
    padding:10px 12px; border-radius:12px;
    border:1px solid var(--border); background:rgba(255,255,255,.04); color:var(--text);
    cursor:pointer; font-family:var(--mono); font-size:calc(12px * var(--font-scale));
  }
  .bulk-btn.primary{
    border-color:color-mix(in srgb, var(--accent) 45%, transparent);
    color:var(--accent);
    background:var(--accent-dim);
  }
  .empty-state{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:58vh; gap:14px; color:var(--muted);
    border:1px dashed var(--border);
    border-radius:26px;
    background:rgba(255,255,255,.02);
  }
  .empty-icon{
    width:72px; height:72px; border:1px solid var(--border);
    border-radius:20px; display:flex; align-items:center; justify-content:center;
    font-size:28px; color:var(--accent);
    background:var(--accent-dim);
  }
  .empty-text{font-family:var(--mono); font-size:calc(14px * var(--font-scale))}
  .pedidos-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(min(100%, 340px), 1fr));
    gap:14px;
    align-items:start;
  }
  .mesa-card{
    background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
    border:1px solid color-mix(in srgb, var(--border) 82%, white 18%);
    border-radius:22px;
    overflow:hidden;
    transition:border-color .28s, transform .18s;
    box-shadow:var(--shadow);
  }
  .mesa-card.nueva{border-color:var(--accent); animation:flash-bg 1.4s ease-in-out infinite}
  .card-header{
    display:flex; align-items:center; gap:10px;
    padding:12px 16px;
    background:rgba(255,255,255,.04);
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--accent); flex-shrink:0; animation:pulse-dot 1s ease-in-out infinite; display:none;
  }
  .mesa-card.nueva .dot{display:block}
  .card-mesa-name{font-family:var(--mono); font-size:calc(14px * var(--font-scale)); font-weight:700; color:var(--accent); flex:1; min-width:0}
  .card-time{font-family:var(--mono); font-size:calc(11px * var(--font-scale)); color:var(--muted-strong)}
  .btn-imprimir,.btn-servido,.btn-parcial,.btn-deshacer,.btn-stock{
    display:inline-flex; align-items:center; justify-content:center;
  }
  .btn-imprimir{
    background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:10px; color:var(--muted);
    font-size:calc(13px * var(--font-scale)); padding:6px 8px; cursor:pointer; transition:border-color .15s,color .15s;
  }
  .btn-imprimir.pendiente{
    color:var(--accent-text);
    border-color:var(--accent);
    background:linear-gradient(180deg, color-mix(in srgb, var(--accent) 34%, transparent), color-mix(in srgb, var(--accent) 18%, transparent));
    box-shadow:0 0 0 1px color-mix(in srgb, var(--accent) 32%, transparent), 0 0 18px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .btn-imprimir.impresa{
    color:var(--muted);
    border-color:var(--border);
    background:rgba(255,255,255,.04);
    box-shadow:none;
  }
  .btn-imprimir:active{border-color:var(--accent); color:var(--accent)}
  .linea-row{
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    transition:opacity .25s, background .2s;
  }
  .linea-row:last-child{border-bottom:none}
  .linea-row.servida{opacity:.35}
  .linea-row.group-match{background:var(--highlight-bg)}
  .linea-row.group-match .linea-main{
    padding:10px 12px; margin:-10px -12px; border-radius:14px; outline:1px solid var(--highlight-border);
  }
  .linea-main{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .linea-count{
    min-width:30px; height:30px; border-radius:999px; flex-shrink:0;
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--count-bg); color:var(--count-text); border:1px solid var(--border);
    font-family:var(--mono); font-size:calc(12px * var(--font-scale)); cursor:pointer;
  }
  .linea-count.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
  .linea-count.hidden{visibility:hidden}
  .linea-qty{font-family:var(--mono); font-size:calc(17px * var(--font-scale)); font-weight:700; min-width:24px; color:var(--accent)}
  .linea-row.servida .linea-qty{color:var(--muted)}
  .linea-nombre{flex:1 1 140px; min-width:0; font-size:calc(15px * var(--font-scale)); color:var(--text)}
  .linea-actions{display:inline-flex; align-items:center; gap:6px; flex-wrap:wrap; margin-left:auto}
  .linea-nota{
    margin-top:6px; margin-left:38px;
    font-size:calc(12px * var(--font-scale)); color:var(--accent); font-family:var(--mono);
    background:var(--accent-dim); border-left:2px solid var(--accent);
    padding:5px 9px; border-radius:0 8px 8px 0; display:inline-block;
  }
  .linea-row.servida .linea-nota{color:var(--muted); background:transparent; border-color:var(--border)}
  .btn-servido,.btn-parcial,.btn-deshacer,.btn-stock{
    font-family:var(--mono); border-radius:10px; cursor:pointer; flex-shrink:0; transition:all .15s;
  }
  .btn-servido{
    font-size:calc(12px * var(--font-scale)); min-width:44px; min-height:40px; padding:6px 10px;
    border:1px solid color-mix(in srgb, var(--accent) 38%, var(--border) 62%);
    background:color-mix(in srgb, var(--surface2) 78%, var(--accent-dim) 22%);
    color:var(--accent); white-space:nowrap; font-weight:700;
  }
  .btn-servido:active{background:var(--border)}
  .btn-servido.hecho{border-color:rgba(113,255,176,.35); color:#36cf78; background:rgba(113,255,176,.1)}
  .linea-row.servida .linea-nombre,.linea-row.servida .linea-qty{text-decoration:line-through; opacity:.45}
  .btn-deshacer{
    font-size:calc(13px * var(--font-scale)); min-height:40px; padding:5px 10px;
    border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:var(--muted);
  }
  .btn-parcial{
    font-size:calc(12px * var(--font-scale)); min-height:40px; padding:5px 10px;
    border:1px solid color-mix(in srgb, var(--accent) 26%, transparent);
    background:var(--accent-dim); color:var(--accent);
  }
  .btn-stock{
    font-size:calc(14px * var(--font-scale)); min-width:44px; min-height:40px; padding:5px 10px;
    border:1px solid rgba(255,122,122,.32); background:rgba(255,122,122,.08); color:#ff6c6c; font-weight:700;
  }

  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.62); z-index:100;
    align-items:center; justify-content:center; padding:1rem; backdrop-filter:blur(4px);
  }
  .modal-overlay.open{display:flex}
  .modal-box{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:22px;
    padding:1.5rem;
    width:100%; max-width:340px;
    display:flex; flex-direction:column; gap:1rem;
    animation:modal-in .18s ease;
    box-shadow:var(--shadow);
  }
  @keyframes modal-in{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:none}}
  .modal-title{font-family:var(--mono); font-size:calc(14px * var(--font-scale)); font-weight:500; color:var(--text)}
  .modal-body{font-size:calc(13px * var(--font-scale)); color:var(--muted-strong); line-height:1.55}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end}
  .modal-btn{
    padding:10px 16px; border-radius:12px; font-family:var(--mono); font-size:calc(12px * var(--font-scale));
    cursor:pointer; border:1px solid var(--border); background:rgba(255,255,255,.05); color:var(--muted);
  }
  .modal-btn.primary{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
  .modal-btn.danger{background:rgba(255,122,122,.14); color:#ff8181; border-color:rgba(255,122,122,.28)}

  #pin-screen{
    position:fixed; inset:0;
    background:
      radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 18%, transparent), transparent 24%),
      linear-gradient(180deg, #09101d 0%, #0d1527 100%);
    z-index:200; display:flex; align-items:center; justify-content:center;
  }
  .pin-box{
    background:linear-gradient(180deg, rgba(18,26,50,.94), rgba(10,15,29,.94));
    border:1px solid var(--border); border-radius:24px;
    padding:2rem 1.5rem; width:290px; display:flex; flex-direction:column; align-items:center; gap:1.25rem;
    box-shadow:var(--shadow);
  }
  .pin-title{font-family:var(--mono); font-size:calc(15px * var(--font-scale)); font-weight:500; color:var(--accent)}
  .pin-sub{font-size:calc(13px * var(--font-scale)); color:var(--muted); text-align:center; margin-top:-.5rem}
  .pin-dots{display:flex; gap:10px}
  .pin-dot{
    width:14px; height:14px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:background .15s,border-color .15s;
  }
  .pin-dot.filled{background:var(--accent); border-color:var(--accent)}
  .pin-dot.error{background:#ff6b6b; border-color:#ff6b6b}
  .pin-pad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%}
  .pin-key{
    height:54px; border-radius:12px; border:1px solid var(--border);
    background:rgba(255,255,255,.05); font-family:var(--mono); font-size:calc(18px * var(--font-scale));
    font-weight:500; color:var(--text); cursor:pointer; transition:background .1s,transform .1s;
    display:flex; align-items:center; justify-content:center;
  }
  .pin-key:active{background:rgba(255,255,255,.1); transform:scale(.95)}
  .pin-key.del{font-size:calc(14px * var(--font-scale)); color:var(--muted)}
  .pin-key.empty{border:none; background:none; cursor:default}
  .pin-error-msg{font-family:var(--mono); font-size:calc(12px * var(--font-scale)); color:#ff7070; display:none}

  @media (max-width:760px){
    .topbar{top:6px; width:min(100% - 12px, 100%); margin-top:6px; border-radius:18px; padding:10px 12px}
    .screen-shell{width:min(100% - 12px, 100%)}
    .spacer{display:none}
    .prefs-panel{right:auto; left:0}
    .bulk-banner{margin-top:.5rem}
  }
  @media (max-width:420px){
    .pedidos-grid{grid-template-columns:minmax(0,1fr)}
    .card-header,.linea-row{padding-left:12px; padding-right:12px}
    .linea-actions{width:100%; margin-left:38px}
  }
</style>
</head>
<body>

<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-title" id="pin-rol-title">Comandero 2.5</div>
    <div class="pin-sub">Introduce el PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-error-msg" id="pin-error">PIN incorrecto</div>
    <div class="pin-pad" id="pin-pad">
      <button class="pin-key" data-k="1">1</button>
      <button class="pin-key" data-k="2">2</button>
      <button class="pin-key" data-k="3">3</button>
      <button class="pin-key" data-k="4">4</button>
      <button class="pin-key" data-k="5">5</button>
      <button class="pin-key" data-k="6">6</button>
      <button class="pin-key" data-k="7">7</button>
      <button class="pin-key" data-k="8">8</button>
      <button class="pin-key" data-k="9">9</button>
      <button class="pin-key empty" data-k=""></button>
      <button class="pin-key" data-k="0">0</button>
      <button class="pin-key del" data-k="del">DEL</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div class="topbar">
  <span class="topbar-title" id="topbar-title">Barra 2.5</span>
  <div class="spacer"></div>
  <label class="wake-toggle" title="Pantalla siempre encendida">
    <div class="wake-track" id="wake-track"><div class="wake-thumb"></div></div>
    <span>Wake</span>
  </label>
  <label class="print-toggle" title="Imprimir automaticamente al llegar un pedido">
    <div class="toggle-track" id="print-track"><div class="toggle-thumb"></div></div>
    <span>Print</span>
  </label>
  <label class="print-toggle" title="Generar TXT para autoimpresion sin dialogo">
    <div class="toggle-track" id="txt-track"><div class="toggle-thumb"></div></div>
    <span>TXT</span>
  </label>
  <div class="prefs-wrap">
    <button class="prefs-btn" id="prefs-btn" title="Ajustes">Aa</button>
    <div class="prefs-panel" id="prefs-panel">
      <label class="prefs-label" for="theme-select">Tema</label>
      <select id="theme-select">
        <option value="dark">Oscuro</option>
        <option value="light">Claro</option>
      </select>
      <label class="prefs-label" for="font-select">Tamano letra</label>
      <select id="font-select">
        <option value="0.9">Compacto</option>
        <option value="1">Normal</option>
        <option value="1.15">Grande</option>
        <option value="1.3">Muy grande</option>
      </select>
    </div>
  </div>
  <span class="badge-nuevos" id="badge-nuevos"></span>
  <span class="clock" id="clock"></span>
</div>

<div class="screen-shell">
  <div class="bulk-banner" id="bulk-banner">
    <div class="bulk-text" id="bulk-text"></div>
    <button class="bulk-btn primary" id="bulk-serve-btn">Marcar grupo servido</button>
    <button class="bulk-btn" id="bulk-clear-btn">Quitar seleccion</button>
  </div>

  <div id="pedidos-container">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">*</div>
      <span class="empty-text">Sin pedidos pendientes</span>
    </div>
    <div class="pedidos-grid" id="pedidos-grid" style="display:none"></div>
  </div>
</div>

<script type="module" src="barra.js"></script>
</body>
</html>
